<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0D0D12">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Esnayder">
<link rel="manifest" href="manifest.json">
<title>Esnayder Videomaker — Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #6A28FF;
    --purple-dark: #2B1D8F;
    --purple-glow: rgba(106,40,255,0.4);
    --black: #0D0D12;
    --black2: #13131A;
    --black3: #1A1A24;
    --white: #FFFFFF;
    --grey: #8888AA;
    --card-bg: rgba(255,255,255,0.03);
    --border: rgba(106,40,255,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BACKGROUND GRID */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(106,40,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(106,40,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* GLOW ORBS */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(106,40,255,0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(13,13,18,0.95);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 0;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--purple), var(--purple-dark));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 18px;
    box-shadow: 0 0 20px var(--purple-glow);
  }

  .logo-text {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    line-height: 1.3;
  }

  .logo-sub {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    color: var(--purple);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-admin {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--grey);
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .btn-admin:hover, .btn-admin.active {
    border-color: var(--purple);
    color: var(--purple);
    background: rgba(106,40,255,0.08);
  }

  /* MAIN */
  main {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 100px;
  }

  /* MONTH NAV */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding: 16px 20px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
  }

  .month-nav button {
    background: rgba(106,40,255,0.15);
    border: 1px solid var(--border);
    color: var(--purple);
    width: 36px;
    height: 36px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .month-nav button:hover {
    background: rgba(106,40,255,0.3);
    box-shadow: 0 0 12px var(--purple-glow);
  }

  .month-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 2px;
  }

  .month-count {
    font-size: 11px;
    color: var(--purple);
    text-align: center;
    font-weight: 500;
    margin-top: 2px;
    letter-spacing: 1px;
  }

  /* EVENT CARD */
  .event-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: all 0.3s;
    cursor: pointer;
  }

  .event-card:hover {
    border-color: var(--purple);
    box-shadow: 0 0 20px rgba(106,40,255,0.15);
    transform: translateY(-1px);
  }

  .event-card.expanded {
    border-color: var(--purple);
    box-shadow: 0 0 30px rgba(106,40,255,0.2);
  }

  .event-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px;
  }

  .event-date-box {
    background: linear-gradient(135deg, var(--purple), var(--purple-dark));
    border-radius: 12px;
    width: 48px;
    height: 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 15px rgba(106,40,255,0.4);
  }

  .event-date-day {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 18px;
    line-height: 1;
  }

  .event-date-weekday {
    font-size: 9px;
    letter-spacing: 1px;
    opacity: 0.8;
    text-transform: uppercase;
    font-weight: 600;
  }

  .event-info {
    flex: 1;
    min-width: 0;
  }

  .event-band {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .event-location {
    font-size: 11px;
    color: var(--grey);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .event-time {
    font-size: 11px;
    color: var(--purple);
    font-weight: 600;
    margin-top: 2px;
    letter-spacing: 0.5px;
  }

  .event-chevron {
    color: var(--grey);
    font-size: 12px;
    transition: transform 0.3s;
    flex-shrink: 0;
  }

  .event-card.expanded .event-chevron {
    transform: rotate(180deg);
    color: var(--purple);
  }

  /* EVENT DETAIL */
  .event-detail {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
    margin-top: 0;
  }

  .event-card.expanded .event-detail {
    display: block;
  }

  .detail-section {
    margin-top: 14px;
  }

  .detail-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--purple);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .team-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .team-tag {
    background: rgba(106,40,255,0.12);
    border: 1px solid rgba(106,40,255,0.3);
    color: var(--white);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .demand-list {
    list-style: none;
  }

  .demand-list li {
    font-size: 12px;
    color: var(--grey);
    padding: 4px 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .demand-list li::before {
    content: '';
    width: 4px;
    height: 4px;
    background: var(--purple);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  .status-confirmed {
    background: rgba(0,200,100,0.12);
    border: 1px solid rgba(0,200,100,0.3);
    color: #00C864;
  }

  .status-pending {
    background: rgba(255,160,0,0.12);
    border: 1px solid rgba(255,160,0,0.3);
    color: #FFA000;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--grey);
  }

  .empty-state .icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .empty-state p {
    font-size: 13px;
    letter-spacing: 1px;
  }

  /* ADMIN PANEL */
  .admin-panel {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    overflow-y: auto;
    padding: 20px 16px;
  }

  .admin-panel.visible { display: block; }

  .admin-box {
    background: var(--black2);
    border: 1px solid var(--border);
    border-radius: 20px;
    max-width: 480px;
    margin: 0 auto;
    overflow: hidden;
  }

  .admin-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .admin-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
  }

  .btn-close {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--white);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* LOGIN */
  .login-form {
    padding: 32px 20px;
    text-align: center;
  }

  .login-form p {
    font-size: 13px;
    color: var(--grey);
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .input-field {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    padding: 14px 16px;
    border-radius: 12px;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-field:focus {
    border-color: var(--purple);
  }

  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--purple), var(--purple-dark));
    border: none;
    color: var(--white);
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 15px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(106,40,255,0.3);
  }

  .btn-primary:hover {
    box-shadow: 0 0 30px rgba(106,40,255,0.5);
    transform: translateY(-1px);
  }

  .error-msg {
    color: #FF4060;
    font-size: 12px;
    margin-top: 8px;
  }

  /* ADMIN CONTENT */
  .admin-content {
    padding: 20px;
  }

  .admin-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .admin-tab {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--grey);
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .admin-tab.active {
    background: rgba(106,40,255,0.15);
    border-color: var(--purple);
    color: var(--purple);
  }

  /* FORM */
  .form-group {
    margin-bottom: 14px;
  }

  .form-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--purple);
    font-weight: 600;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  select.input-field {
    appearance: none;
    cursor: pointer;
  }

  textarea.input-field {
    resize: vertical;
    min-height: 80px;
  }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--grey);
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    padding: 10px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-secondary:hover {
    border-color: #FF4060;
    color: #FF4060;
  }

  /* EVENT LIST ADMIN */
  .admin-event-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .admin-event-info { flex: 1; min-width: 0; }

  .admin-event-band {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
  }

  .admin-event-date {
    font-size: 11px;
    color: var(--grey);
    margin-top: 2px;
  }

  .admin-actions {
    display: flex;
    gap: 6px;
  }

  .btn-icon {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--grey);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .btn-icon:hover { border-color: var(--purple); color: var(--purple); }
  .btn-icon.del:hover { border-color: #FF4060; color: #FF4060; }

  /* PAYMENT TAB */
  .payment-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }

  .payment-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .payment-event {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
  }

  .payment-date {
    font-size: 10px;
    color: var(--grey);
  }

  .payment-rows {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .payment-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
  }

  .payment-name { color: var(--grey); }
  .payment-amount { color: var(--white); font-weight: 600; }
  .payment-status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .paid { background: #00C864; }
  .unpaid { background: #FFA000; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 50;
    background: linear-gradient(135deg, var(--purple), var(--purple-dark));
    border: none;
    color: var(--white);
    width: 56px;
    height: 56px;
    border-radius: 16px;
    cursor: pointer;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px rgba(106,40,255,0.5);
    transition: all 0.2s;
  }

  .fab:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(106,40,255,0.7); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--purple);
    color: white;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 12px 20px;
    border-radius: 12px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 200;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--grey);
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .whatsapp-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    background: rgba(37,211,102,0.1);
    border: 1px solid rgba(37,211,102,0.3);
    color: #25D366;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 13px;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    text-decoration: none;
  }

  .whatsapp-btn:hover {
    background: rgba(37,211,102,0.2);
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-area">
    <div class="logo-icon">E</div>
    <div>
      <div class="logo-text">ESNAYDER</div>
      <div class="logo-sub">Videomaker</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-admin" onclick="openAdmin()">⚙ Admin</button>
  </div>
</header>

<!-- MAIN -->
<main>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <div>
      <div class="month-title" id="monthTitle">—</div>
      <div class="month-count" id="monthCount"></div>
    </div>
    <button onclick="changeMonth(1)">›</button>
  </div>

  <div id="eventsList"></div>
</main>

<!-- FAB -->
<button class="fab" onclick="openAdmin()" title="Adicionar evento">+</button>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">
  <div class="admin-box">

    <!-- LOGIN -->
    <div id="loginSection">
      <div class="admin-header">
        <div class="admin-title">ACESSO ADMIN</div>
        <button class="btn-close" onclick="closeAdmin()">✕</button>
      </div>
      <div class="login-form">
        <p>Área restrita.<br>Digite a senha para acessar.</p>
        <input class="input-field" type="password" id="passwordInput" placeholder="Senha" onkeydown="if(event.key==='Enter')checkPassword()">
        <button class="btn-primary" onclick="checkPassword()">ENTRAR</button>
        <div class="error-msg" id="loginError"></div>
      </div>
    </div>

    <!-- ADMIN CONTENT -->
    <div id="adminContent" style="display:none">
      <div class="admin-header">
        <div class="admin-title">PAINEL ADMIN</div>
        <button class="btn-close" onclick="closeAdmin()">✕</button>
      </div>
      <div class="admin-content">
        <div class="admin-tabs">
          <button class="admin-tab active" onclick="switchTab('events', this)">Eventos</button>
          <button class="admin-tab" onclick="switchTab('add', this)">+ Novo</button>
          <button class="admin-tab" onclick="switchTab('payments', this)">Pagamentos</button>
        </div>

        <!-- TAB: EVENTS LIST -->
        <div id="tab-events">
          <div class="section-title">Todos os Eventos</div>
          <div id="adminEventsList"></div>
        </div>

        <!-- TAB: ADD EVENT -->
        <div id="tab-add" style="display:none">
          <div class="section-title" id="formTitle">Novo Evento</div>
          <input type="hidden" id="editingId">

          <div class="form-group">
            <label class="form-label">Banda / Artista</label>
            <input class="input-field" type="text" id="fBand" placeholder="Nome da banda ou artista">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Data</label>
              <input class="input-field" type="date" id="fDate">
            </div>
            <div class="form-group">
              <label class="form-label">Horário</label>
              <input class="input-field" type="time" id="fTime">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Local / Cidade</label>
            <input class="input-field" type="text" id="fLocation" placeholder="Ex: Macambira/SE">
          </div>

          <div class="form-group">
            <label class="form-label">Equipe (separe por vírgula)</label>
            <input class="input-field" type="text" id="fTeam" placeholder="Ex: Esnayder, Weslley, João">
          </div>

          <div class="form-group">
            <label class="form-label">Demandas</label>
            <textarea class="input-field" id="fDemands" placeholder="Ex: Câmera principal, Drone, Edição rápida 48h"></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="input-field" id="fStatus">
              <option value="confirmed">Confirmado</option>
              <option value="pending">Pendente</option>
            </select>
          </div>

          <button class="btn-primary" onclick="saveEvent()" style="margin-bottom:10px">SALVAR EVENTO</button>
          <button class="btn-secondary" onclick="clearForm()" style="width:100%">Limpar formulário</button>
        </div>

        <!-- TAB: PAYMENTS -->
        <div id="tab-payments" style="display:none">
          <div class="section-title">Pagamentos por Evento</div>
          <div id="paymentsList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const ADMIN_PASSWORD = 'esnayder2026';
const TEAM_MEMBERS = ['Esnayder', 'Weslley', 'Membro 3', 'Membro 4', 'Membro 5'];
const WEEKDAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

let currentMonth = 4; // Maio
let currentYear = 2026;
let isAdmin = false;

// Load from localStorage
function loadEvents() {
  try { return JSON.parse(localStorage.getItem('esnayder_events') || '[]'); } catch { return []; }
}

function saveEvents(events) {
  localStorage.setItem('esnayder_events', JSON.stringify(events));
}

function loadPayments() {
  try { return JSON.parse(localStorage.getItem('esnayder_payments') || '{}'); } catch { return {}; }
}

function savePayments(payments) {
  localStorage.setItem('esnayder_payments', JSON.stringify(payments));
}

// Force load Liene Show events, preserving any team/demands already saved
function initDemo() {
  const base = [
    { id: 'ls01a', band: 'Liene Show', date: '2026-05-01', time: '', location: 'Macambira/SE', team: [], demands: [], status: 'confirmed' },
    { id: 'ls01b', band: 'Liene Show', date: '2026-05-01', time: '', location: 'Piaçabuçu/AL', team: [], demands: [], status: 'confirmed' },
    { id: 'ls03',  band: 'Liene Show', date: '2026-05-03', time: '', location: 'Maruim/SE', team: [], demands: [], status: 'confirmed' },
    { id: 'ls05',  band: 'Liene Show', date: '2026-05-05', time: '', location: 'Aracaju/SE', team: [], demands: [], status: 'confirmed' },
    { id: 'ls08',  band: 'Liene Show', date: '2026-05-08', time: '', location: 'Cachoeira de Pajeú/MG', team: [], demands: [], status: 'confirmed' },
    { id: 'ls09',  band: 'Liene Show', date: '2026-05-09', time: '', location: 'Riachão do Dantas/SE', team: [], demands: [], status: 'confirmed' },
    { id: 'ls15',  band: 'Liene Show', date: '2026-05-15', time: '', location: 'Aracaju/SE', team: [], demands: [], status: 'confirmed' },
    { id: 'ls30',  band: 'Liene Show', date: '2026-05-30', time: '', location: 'Malhada dos Bois/SE', team: [], demands: [], status: 'confirmed' },
  ];
  const existing = loadEvents();
  const extras = existing.filter(e => !base.find(b => b.id === e.id));
  const merged = base.map(b => {
    const saved = existing.find(e => e.id === b.id);
    return saved ? { ...b, team: saved.team, demands: saved.demands, status: saved.status, time: saved.time } : b;
  });
  saveEvents([...merged, ...extras]);
  if (!localStorage.getItem('esnayder_payments')) savePayments({});
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderEvents() {
  const events = loadEvents();
  const filtered = events.filter(e => {
    const d = new Date(e.date + 'T00:00:00');
    return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
  }).sort((a,b) => new Date(a.date) - new Date(b.date));

  document.getElementById('monthTitle').textContent = `${MONTHS[currentMonth]} ${currentYear}`;
  document.getElementById('monthCount').textContent = filtered.length === 0 ? 'Nenhum evento' : `${filtered.length} evento${filtered.length > 1 ? 's' : ''}`;

  const container = document.getElementById('eventsList');

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🎬</div><p>Nenhum evento neste mês</p></div>`;
    return;
  }

  container.innerHTML = filtered.map(e => {
    const d = new Date(e.date + 'T00:00:00');
    const day = String(d.getDate()).padStart(2,'0');
    const weekday = WEEKDAYS[d.getDay()];
    const statusBadge = e.status === 'confirmed'
      ? `<span class="status-badge status-confirmed">● Confirmado</span>`
      : `<span class="status-badge status-pending">● Pendente</span>`;

    const teamTags = e.team.length > 0
      ? e.team.map(t => `<span class="team-tag">${t}</span>`).join('')
      : `<span style="font-size:11px;color:var(--grey);font-style:italic">A definir</span>`;
    const demandList = e.demands.map(d => `<li>${d}</li>`).join('');
    const waText = encodeURIComponent(`🎬 *ESNAYDER VIDEOMAKER*\n📅 ${day}/${String(currentMonth+1).padStart(2,'0')}/${currentYear}${e.time ? ' — ' + e.time : ''}\n🎤 ${e.band}\n📍 ${e.location}${e.team.length > 0 ? '\n\nEquipe: ' + e.team.join(', ') : ''}`);

    return `
      <div class="event-card" id="card-${e.id}" onclick="toggleCard('${e.id}')">
        <div class="event-header">
          <div class="event-date-box">
            <div class="event-date-day">${day}</div>
            <div class="event-date-weekday">${weekday}</div>
          </div>
          <div class="event-info">
            <div class="event-band">${e.band}</div>
            <div class="event-location">📍 ${e.location}</div>
            ${e.time ? `<div class="event-time">⏱ ${e.time}</div>` : ''}
          </div>
          <div class="event-chevron">▼</div>
        </div>
        <div class="event-detail">
          <div class="detail-section">
            ${statusBadge}
          </div>
          <div class="detail-section">
            <div class="detail-label">Equipe</div>
            <div class="team-tags">${teamTags}</div>
          </div>
          ${e.demands.length > 0 ? `
          <div class="detail-section">
            <div class="detail-label">Demandas</div>
            <ul class="demand-list">${demandList}</ul>
          </div>` : ''}
          <div class="detail-section">
            <a class="whatsapp-btn" href="https://wa.me/?text=${waText}" target="_blank">
              📱 Compartilhar no WhatsApp
            </a>
          </div>
        </div>
      </div>`;
  }).join('') + `<div style="margin-top:16px;padding:12px 16px;background:rgba(255,160,0,0.06);border:1px solid rgba(255,160,0,0.2);border-radius:12px;font-size:11px;color:#FFA000;text-align:center;letter-spacing:0.5px">⚠ Agenda sujeita a alterações</div>`;
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('expanded');
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderEvents();
}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
function openAdmin() {
  document.getElementById('adminPanel').classList.add('visible');
  if (isAdmin) showAdminContent();
}

function closeAdmin() {
  document.getElementById('adminPanel').classList.remove('visible');
  document.getElementById('passwordInput').value = '';
  document.getElementById('loginError').textContent = '';
}

function checkPassword() {
  const val = document.getElementById('passwordInput').value;
  if (val === ADMIN_PASSWORD) {
    isAdmin = true;
    showAdminContent();
  } else {
    document.getElementById('loginError').textContent = 'Senha incorreta.';
  }
}

function showAdminContent() {
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('adminContent').style.display = 'block';
  renderAdminEvents();
  renderPayments();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['events','add','payments'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  if (tab === 'events') renderAdminEvents();
  if (tab === 'payments') renderPayments();
}

function renderAdminEvents() {
  const events = loadEvents().sort((a,b) => new Date(a.date) - new Date(b.date));
  const container = document.getElementById('adminEventsList');
  if (events.length === 0) {
    container.innerHTML = '<p style="color:var(--grey);font-size:12px;text-align:center;padding:20px">Nenhum evento cadastrado.</p>';
    return;
  }
  container.innerHTML = events.map(e => {
    const d = new Date(e.date + 'T00:00:00');
    return `
      <div class="admin-event-item">
        <div class="admin-event-info">
          <div class="admin-event-band">${e.band}</div>
          <div class="admin-event-date">${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()} — ${e.location}</div>
        </div>
        <div class="admin-actions">
          <button class="btn-icon" onclick="editEvent('${e.id}')">✏</button>
          <button class="btn-icon del" onclick="deleteEvent('${e.id}')">✕</button>
        </div>
      </div>`;
  }).join('');
}

function saveEvent() {
  const id = document.getElementById('editingId').value || 'ev_' + Date.now();
  const band = document.getElementById('fBand').value.trim();
  const date = document.getElementById('fDate').value;
  const time = document.getElementById('fTime').value;
  const location = document.getElementById('fLocation').value.trim();
  const teamRaw = document.getElementById('fTeam').value;
  const demandsRaw = document.getElementById('fDemands').value;
  const status = document.getElementById('fStatus').value;

  if (!band || !date || !location) { showToast('Preencha banda, data e local.'); return; }

  const team = teamRaw.split(',').map(s=>s.trim()).filter(Boolean);
  const demands = demandsRaw.split('\n').map(s=>s.trim()).filter(Boolean);

  const events = loadEvents();
  const existing = events.findIndex(e => e.id === id);
  const newEvent = { id, band, date, time, location, team, demands, status };

  if (existing >= 0) events[existing] = newEvent;
  else events.push(newEvent);

  saveEvents(events);

  // Init payments for this event
  const payments = loadPayments();
  if (!payments[id]) payments[id] = team.map(name => ({ name, amount: '', paid: false }));
  savePayments(payments);

  clearForm();
  renderEvents();
  showToast('Evento salvo com sucesso!');
  switchTab('events', document.querySelectorAll('.admin-tab')[0]);
}

function editEvent(id) {
  const events = loadEvents();
  const e = events.find(ev => ev.id === id);
  if (!e) return;

  document.getElementById('editingId').value = e.id;
  document.getElementById('fBand').value = e.band;
  document.getElementById('fDate').value = e.date;
  document.getElementById('fTime').value = e.time || '';
  document.getElementById('fLocation').value = e.location;
  document.getElementById('fTeam').value = e.team.join(', ');
  document.getElementById('fDemands').value = e.demands.join('\n');
  document.getElementById('fStatus').value = e.status;
  document.getElementById('formTitle').textContent = 'Editar Evento';

  switchTab('add', document.querySelectorAll('.admin-tab')[1]);
}

function deleteEvent(id) {
  if (!confirm('Deletar este evento?')) return;
  const events = loadEvents().filter(e => e.id !== id);
  saveEvents(events);
  const payments = loadPayments();
  delete payments[id];
  savePayments(payments);
  renderAdminEvents();
  renderEvents();
  showToast('Evento removido.');
}

function clearForm() {
  document.getElementById('editingId').value = '';
  document.getElementById('fBand').value = '';
  document.getElementById('fDate').value = '';
  document.getElementById('fTime').value = '';
  document.getElementById('fLocation').value = '';
  document.getElementById('fTeam').value = '';
  document.getElementById('fDemands').value = '';
  document.getElementById('fStatus').value = 'confirmed';
  document.getElementById('formTitle').textContent = 'Novo Evento';
}

function renderPayments() {
  const events = loadEvents().sort((a,b) => new Date(a.date) - new Date(b.date));
  const payments = loadPayments();
  const container = document.getElementById('paymentsList');

  if (events.length === 0) {
    container.innerHTML = '<p style="color:var(--grey);font-size:12px;text-align:center;padding:20px">Nenhum evento cadastrado.</p>';
    return;
  }

  container.innerHTML = events.map(e => {
    const d = new Date(e.date + 'T00:00:00');
    const payRows = payments[e.id] || e.team.map(name => ({name, amount:'', paid:false}));

    const rows = payRows.map((p, idx) => `
      <div class="payment-row">
        <span class="payment-name">${p.name}</span>
        <input style="background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--white);font-family:Montserrat,sans-serif;font-size:12px;width:80px;text-align:right;outline:none;padding:2px 4px" 
          value="${p.amount}" placeholder="R$ 0,00"
          onchange="updatePayment('${e.id}', ${idx}, 'amount', this.value)">
        <div class="payment-status-dot ${p.paid ? 'paid' : 'unpaid'}" 
          onclick="togglePaid('${e.id}', ${idx})" 
          style="cursor:pointer" title="${p.paid ? 'Pago — clique para desfazer' : 'Pendente — clique para marcar como pago'}">
        </div>
      </div>`).join('');

    return `
      <div class="payment-item">
        <div class="payment-header">
          <div class="payment-event">${e.band}</div>
          <div class="payment-date">${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}</div>
        </div>
        <div class="payment-rows">${rows}</div>
      </div>`;
  }).join('');
}

function updatePayment(eventId, idx, field, value) {
  const payments = loadPayments();
  const events = loadEvents();
  const e = events.find(ev => ev.id === eventId);
  if (!payments[eventId]) payments[eventId] = e.team.map(name => ({name, amount:'', paid:false}));
  payments[eventId][idx][field] = value;
  savePayments(payments);
}

function togglePaid(eventId, idx) {
  const payments = loadPayments();
  const events = loadEvents();
  const e = events.find(ev => ev.id === eventId);
  if (!payments[eventId]) payments[eventId] = e.team.map(name => ({name, amount:'', paid:false}));
  payments[eventId][idx].paid = !payments[eventId][idx].paid;
  savePayments(payments);
  renderPayments();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
initDemo();
renderEvents();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('SW registrado'))
      .catch(e => console.log('SW erro:', e));
  });
}
</script>
</body>
</html>
